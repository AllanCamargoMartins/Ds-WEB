<body>
    <ul>
        <li><a href="index.html">Início</a></li>

    <div class="formulario">
        <h3>Cadastro de Produtos</h3>
        <label for="nome">Nome do Produto</label>
        <input type="text" id="nome" name="nome">

        <label for="preco">Preço do Produto</label>
        <input type="text" id="preco" name="preco">

        <label for="categoria_id">Categoria do Produto</label>
        <select name="categoria_id" id="categoria_id">
            <option value="">Carregando categorias...</option>
        </select>

        <label for="disponivel">Disponibilidade do Produto</label>
        <select name="disponivel" id="disponivel">
            <option value="0">0</option>
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5">5</option>

        </select>

        <button type="button" id="botaoEnviar" class="button button-enviar">Cadastrar</button>
    </div>



    <div id="resposta" class="tabela">

    </div>
</body>
